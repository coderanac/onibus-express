services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/data/production.db
      - NODE_ENV=production
    volumes:
      - onibus-express-db:/app/prisma/data
    restart: unless-stopped

volumes:
  onibus-express-db:
